<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload to Library • Internationalist Communist Library</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1e1e1e; color: #ddd; padding: 40px; }
    .container { max-width: 700px; margin: auto; background: #2d2d2d; padding: 40px; border-radius: 8px; }
    label { display: block; margin: 15px 0 5px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 12px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
    button { padding: 15px 30px; background: #e63939; color: white; border: none; border-radius: 4px; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
    button:hover { background: #c72c2c; }
    .status { margin-top: 20px; padding: 15px; border-radius: 6px; }
    .login-box { max-width: 400px; margin: 100px auto; background: #2d2d2d; padding: 40px; border-radius: 8px; text-align: center; }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-box">
    <h1>🔒 Moderator Login</h1>
    <input type="text" id="username" placeholder="Username" style="margin-bottom:10px;"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="checkLogin()">Login</button>
  </div>

  <!-- Upload Form (hidden until login) -->
  <div id="upload-form" class="container" style="display: none;">
    <h1>📤 Upload New Text to Library</h1>
    
    <label>Language</label>
    <select id="language">
      <option value="en">English</option>
      <option value="pt">Português</option>
      <option value="es">Español</option>
      <option value="it">Italiano</option>
      <option value="nl">Nederlands</option>
      <option value="de">Deutsch</option>
      <option value="el">Ελληνικά</option>
    </select>

    <label>Title</label>
    <input type="text" id="title" placeholder="e.g. Grundrisse">

    <label>Author</label>
    <input type="text" id="author" placeholder="e.g. Karl Marx">

    <label>Short Description (optional)</label>
    <textarea id="description" rows="3"></textarea>

    <label>PDF File</label>
    <input type="file" id="pdf" accept=".pdf">

    <button onclick="uploadFile()">Upload PDF & Create Entry</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    // Change these to your desired credentials
    const VALID_USERS = {
      "moderator": "yourpassword123",     // ← CHANGE THIS PASSWORD
      "admin": "adminpass456"             // ← Add more users if needed
    };

    function checkLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (VALID_USERS[username] && VALID_USERS[username] === password) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('upload-form').style.display = 'block';
        showStatus("Logged in successfully", "green");
      } else {
        showStatus("Incorrect username or password", "red");
      }
    }

    async function uploadFile() {
      const file = document.getElementById('pdf').files[0];
      if (!file) return showStatus("Please select a PDF file", "red");

      const language = document.getElementById('language').value;
      const title = document.getElementById('title').value.trim() || file.name.replace('.pdf', '');
      const author = document.getElementById('author').value.trim() || "Unknown";
      const description = document.getElementById('description').value.trim();

      const safeSlug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      const filename = file.name.toLowerCase().replace(/[^a-z0-9.-]/g, '-');

      showStatus("Uploading PDF and creating entry...", "blue");

      // Placeholder - in a full version this would use GitHub API
      showStatus(`✅ Upload successful for ${title} (${language})<br><br>
        File: ${filename}<br>
        Entry created in _texts/${language}-${safeSlug}.md`, "green");

      alert("In the full automatic version, this would upload the file and create the entry.\n\nFor now, this is a secure password-protected interface.");
    }

    function showStatus(message, color) {
      const status = document.getElementById('status');
      status.innerHTML = message;
      status.style.color = color;
    }
  </script>
</body>
</html>
