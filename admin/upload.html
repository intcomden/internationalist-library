<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload to Library • Internationalist Communist Library</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1e1e1e; color: #ddd; padding: 40px; }
    .container { max-width: 700px; margin: auto; background: #2d2d2d; padding: 40px; border-radius: 8px; }
    label { display: block; margin: 15px 0 5px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 12px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
    button { padding: 15px 30px; background: #e63939; color: white; border: none; border-radius: 4px; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
    button:hover { background: #c72c2c; }
    .status { margin-top: 20px; padding: 15px; border-radius: 6px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📤 Upload New Text to Library</h1>

    <label>Language</label>
    <select id="language">
      <option value="en">English</option>
      <option value="pt">Português</option>
      <option value="es">Español</option>
      <option value="it">Italiano</option>
      <option value="nl">Nederlands</option>
      <option value="de">Deutsch</option>
      <option value="el">Ελληνικά</option>
    </select>

    <label>Title</label>
    <input type="text" id="title" placeholder="e.g. Grundrisse">

    <label>Author</label>
    <input type="text" id="author" placeholder="e.g. Karl Marx">

    <label>Short Description (optional)</label>
    <textarea id="description" rows="3"></textarea>

    <label>PDF File</label>
    <input type="file" id="pdf" accept=".pdf">

    <button onclick="uploadFile()">Upload PDF & Create Entry</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    const GITHUB_TOKEN = "YOUR_GITHUB_TOKEN_HERE";   // ← CHANGE THIS
    const REPO_OWNER = "intcomden";
    const REPO_NAME = "internationalist-library";

    async function uploadFile() {
      const fileInput = document.getElementById('pdf');
      const file = fileInput.files[0];
      if (!file) return showStatus("Please select a PDF file", "red");

      const language = document.getElementById('language').value;
      const title = document.getElementById('title').value.trim() || file.name.replace('.pdf', '');
      const author = document.getElementById('author').value.trim() || "Unknown";
      const description = document.getElementById('description').value.trim();

      const safeSlug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      const filename = file.name.toLowerCase().replace(/[^a-z0-9.-]/g, '-');
      const filePath = `assets/uploads/${filename}`;
      const mdPath = `_texts/${language}-${safeSlug}.md`;

      showStatus("Uploading PDF and creating entry...", "blue");

      try {
        // 1. Upload the PDF
        const pdfContent = await fileToBase64(file);
        await uploadToGitHub(filePath, pdfContent, `Add ${filename}`);

        // 2. Create the markdown entry
        const mdContent = `---
layout: text
title: "${title}"
author: "${author}"
language: "${language}"
pdf: "${filename}"
---

${description || ''}`;

        await uploadToGitHub(mdPath, btoa(unescape(encodeURIComponent(mdContent))), `Add ${title} entry`);

        showStatus(`✅ Success!<br><br>PDF uploaded and entry created.<br><br>View at: <a href="${window.location.origin}${window.location.pathname.replace('upload.html','')}${language}/${safeSlug}/" target="_blank">Open Page</a>`, "green");

      } catch (error) {
        showStatus("Error: " + error.message, "red");
        console.error(error);
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function uploadToGitHub(path, content, message) {
      const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${GITHUB_TOKEN}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: message,
          content: content,
          branch: 'main'
        })
      });

      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.message || 'Upload failed');
      }
      return response.json();
    }

    function showStatus(message, color) {
      const status = document.getElementById('status');
      status.innerHTML = message;
      status.style.color = color;
    }
  </script>
</body>
</html>
