<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin • Internationalist Communist Library</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1e1e1e; color: #ddd; padding: 40px; }
    .container { max-width: 900px; margin: auto; background: #2d2d2d; padding: 40px; border-radius: 8px; }
    .login-box { max-width: 400px; margin: 100px auto; background: #2d2d2d; padding: 40px; border-radius: 8px; text-align: center; }
    input, select, textarea { width: 100%; padding: 12px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; margin: 8px 0; }
    button { padding: 14px 28px; background: #e63939; color: white; border: none; border-radius: 4px; font-size: 1.05em; cursor: pointer; margin: 10px; }
    button:hover { background: #c72c2c; }
    button.delete { background: #8b0000; }
    button.delete:hover { background: #660000; }
    .item { margin: 12px 0; padding: 15px; background: #3a3a3a; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
    .status { margin: 15px 0; padding: 15px; border-radius: 6px; }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-box">
    <h1>🔒 Moderator Login</h1>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="checkLogin()">Login</button>
  </div>

  <!-- Admin Menu -->
  <div id="admin-menu" class="container" style="display: none;">
    <h1>Admin Panel</h1>

    <!-- Upload Section -->
    <h2>Upload New Text</h2>
    <label>Language</label>
    <select id="language">
      <option value="en">English</option>
      <option value="pt">Português</option>
      <option value="es">Español</option>
      <option value="it">Italiano</option>
      <option value="nl">Nederlands</option>
      <option value="de">Deutsch</option>
      <option value="el">Ελληνικά</option>
    </select>

    <label>Title</label>
    <input type="text" id="title">

    <label>Author</label>
    <input type="text" id="author">

    <label>PDF File</label>
    <input type="file" id="pdf" accept=".pdf">

    <button onclick="uploadFile()">Upload New PDF</button>

    <!-- Delete Section -->
    <h2 style="margin-top: 50px; color: #ff6666;">Delete Existing Text</h2>
    <div id="delete-list"></div>

    <div id="status" class="status"></div>
  </div>

  <script>
    // ================== CHANGE THESE ==================
    const GITHUB_TOKEN = "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";   // ← Put your PAT here
    const REPO_OWNER = "intcomden";
    const REPO_NAME = "internationalist-library";
    // =================================================

    const VALID_USERS = {
      "moderator": "D4men!",   // Change this
      "admin": "B0rdiga!", 
      "nap": "pr0gramm4!",
      "alex": "d1sc0!",
      "pasti": "g3rm4n!"
    };

    function checkLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (VALID_USERS[username] && VALID_USERS[username] === password) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-menu').style.display = 'block';
        loadDeleteList();
      } else {
        alert("Incorrect username or password");
      }
    }

    // ================== DELETE FUNCTION ==================
    async function loadDeleteList() {
      const listDiv = document.getElementById('delete-list');
      listDiv.innerHTML = "<p>Loading texts...</p>";

      try {
        const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/_texts`, {
          headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
        });

        if (!response.ok) throw new Error("Could not load texts");

        const files = await response.json();

        let html = "";
        files.forEach(file => {
          if (file.name.endsWith('.md')) {
            html += `
              <div class="item">
                <span>${file.name}</span>
                <button class="delete" onclick="deleteText('${file.path}', '${file.sha}')">Delete</button>
              </div>`;
          }
        });

        listDiv.innerHTML = html || "<p>No texts found.</p>";

      } catch (error) {
        listDiv.innerHTML = `<p style="color:red;">Error loading list: ${error.message}</p>`;
      }
    }

    async function deleteText(path, sha) {
      if (!confirm("Delete this text permanently?")) return;

      try {
        const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `token ${GITHUB_TOKEN}`,
            'Accept': 'application/vnd.github.v3+json'
          },
          body: JSON.stringify({
            message: `Delete ${path}`,
            sha: sha,
            branch: 'main'
          })
        });

        if (response.ok) {
          showStatus(`✅ Deleted ${path}`, "green");
          loadDeleteList(); // Refresh list
        } else {
          showStatus("Failed to delete", "red");
        }
      } catch (error) {
        showStatus("Error: " + error.message, "red");
      }
    }

    // ================== UPLOAD FUNCTION (Placeholder) ==================
    async function uploadFile() {
      const file = document.getElementById('pdf').files[0];
      if (!file) return showStatus("Please select a PDF file", "red");

      showStatus("Upload started... (Demo mode for now)", "blue");
      setTimeout(() => showStatus("✅ Upload successful (demo)", "green"), 1500);
    }

    function showStatus(message, color) {
      const status = document.getElementById('status');
      status.innerHTML = message;
      status.style.color = color;
    }
  </script>
</body>
</html>
