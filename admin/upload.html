<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload to Library • Internationalist Communist Library</title>
  <style>
    body { font-family: Arial, sans-serif; background: #1e1e1e; color: #ddd; padding: 40px; }
    .container { max-width: 700px; margin: auto; background: #2d2d2d; padding: 40px; border-radius: 8px; }
    label { display: block; margin: 15px 0 5px; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 12px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
    button { padding: 15px 30px; background: #e63939; color: white; border: none; border-radius: 4px; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
    button:hover { background: #c72c2c; }
    .status { margin-top: 20px; padding: 15px; border-radius: 6px; }
    .login-box { max-width: 400px; margin: 80px auto; background: #2d2d2d; padding: 40px; border-radius: 8px; text-align: center; }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-box">
    <h1>🔒 Team Login</h1>
    <input type="text" id="username" placeholder="Username" style="margin-bottom:10px;"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="checkLogin()">Login</button>
  </div>

  <!-- Upload Form -->
  <div id="upload-form" class="container" style="display: none;">
    <h1>📤 Upload New Text</h1>

    <label>Language</label>
    <select id="language">
      <option value="en">English</option>
      <option value="pt">Português</option>
      <option value="es">Español</option>
      <option value="it">Italiano</option>
      <option value="nl">Nederlands</option>
      <option value="de">Deutsch</option>
      <option value="el">Ελληνικά</option>
    </select>

    <label>Title</label>
    <input type="text" id="title" placeholder="e.g. Grundrisse">

    <label>Author</label>
    <input type="text" id="author" placeholder="e.g. Karl Marx">

    <label>Short Description (optional)</label>
    <textarea id="description" rows="3"></textarea>

    <label>PDF File</label>
    <input type="file" id="pdf" accept=".pdf">

    <button onclick="uploadFile()">Upload PDF & Create Entry</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    // ================== CHANGE THESE ==================
    const GITHUB_TOKEN = "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
";   // ← Paste your PAT here
    const REPO_OWNER = "intcomden";
    const REPO_NAME = "internationalist-library";

    const VALID_USERS = {
      "moderator": "l4asagna!!@",   // ← CHANGE THIS
      "admin": "l1brarydude##2"
    };
    // =================================================

    function checkLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;

      if (VALID_USERS[user] && VALID_USERS[user] === pass) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('upload-form').style.display = 'block';
      } else {
        alert("Incorrect username or password");
      }
    }

    async function uploadFile() {
      const file = document.getElementById('pdf').files[0];
      if (!file) return showStatus("Please select a PDF file", "red");

      const language = document.getElementById('language').value;
      const title = document.getElementById('title').value.trim() || file.name.replace('.pdf', '');
      const author = document.getElementById('author').value.trim() || "Unknown";
      const description = document.getElementById('description').value.trim();

      const safeSlug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      const filename = file.name.toLowerCase().replace(/[^a-z0-9.-]/g, '-');

      const pdfPath = `assets/uploads/${filename}`;
      const mdPath = `_texts/${language}-${safeSlug}.md`;

      showStatus("Uploading PDF and creating entry...", "blue");

      try {
        // Upload PDF
        const pdfBase64 = await fileToBase64(file);
        await uploadToGitHub(pdfPath, pdfBase64, `Add PDF: ${filename}`);

        // Create markdown entry
        const mdContent = `---
layout: text
title: "${title}"
author: "${author}"
language: "${language}"
pdf: "${filename}"
---

${description || "No description provided."}`;

        await uploadToGitHub(mdPath, btoa(unescape(encodeURIComponent(mdContent))), `Add text entry: ${title}`);

        showStatus(`✅ Success!<br><br>
          Title: ${title}<br>
          Language: ${language}<br>
          PDF: ${filename}<br><br>
          <a href="https://intcomden.github.io/internationalist-library/${language}/${safeSlug}/" target="_blank">View the new page</a>`, "green");

      } catch (e) {
        showStatus("Error: " + e.message, "red");
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function uploadToGitHub(path, content, message) {
      const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;

      const response = await fetch(url, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${GITHUB_TOKEN}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: message,
          content: content,
          branch: 'main'
        })
      });

      if (!response.ok) {
        const error = await response.json();
        throw new Error(error.message || response.statusText);
      }
      return response.json();
    }

    function showStatus(msg, color) {
      const status = document.getElementById('status');
      status.innerHTML = msg;
      status.style.color = color;
    }
  </script>
</body>
</html>
