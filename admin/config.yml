YAMLtitle: Internationalist Communist Library
description: Official shared library for the Internationalist Communist Discord server

baseurl: "/internationalist-library"
url: "https://intcomden.github.io"

collections:
  - name: "sections"
    label: "Reading Sections"
    folder: "_sections"
    create: true
    extension: "md"
    slug: "{{language}}-{{slug}}"
    fields:
      - { label: "Section Title", name: "title", widget: "string", required: true }
      - { label: "Language", name: "language", widget: "select", options: ["en", "pt", "es", "it", "fr", "de"], default: "en" }
      - { label: "Order", name: "order", widget: "number", default: 10 }
      - { label: "Content (Markdown List)", name: "body", widget: "markdown", required: true }

  - name: "texts"
    label: "Individual Texts"
    folder: "_texts"
    create: true
    extension: "md"
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Language", name: "language", widget: "select", options: ["en", "pt", "es", "it"] }
      - { label: "PDF", name: "pdf", widget: "file" }
      - { label: "Audiobook Link", name: "audiobook", widget: "string" }
