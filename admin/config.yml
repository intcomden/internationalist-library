backend:
  name: github
  repo: intcomden/internationalist-library
  branch: main
  base_url: https://YOUR-WORKER-NAME.yourname.workers.dev   # ← update if using Cloudflare Worker

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "/internationalist-library"

collections:
  - name: "sections"
    label: "Reading Sections"
    folder: "_sections"
    create: true
    extension: "md"
    slug: "{{language}}-{{slug}}"
    fields:
      - { label: "Section Title", name: "title", widget: "string", required: true }
      - { label: "Language", name: "language", widget: "select", options: ["en", "pt", "es", "it"], default: "en" }
      - { label: "Order", name: "order", widget: "number", default: 10 }
      - { label: "Content (Markdown)", name: "body", widget: "markdown", required: true }
      - { label: "PDF Files", name: "pdfs", widget: "list", 
          fields: [
            { label: "PDF Filename", name: "filename", widget: "file", media_folder: "assets/uploads" },
            { label: "Display Name", name: "display_name", widget: "string" }
          ] }
