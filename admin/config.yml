# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: intcomden/internationalist-library   # ← CHANGE THIS (e.g. denver123/leftcom-library)
  branch: main

# Media / PDF uploads
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# Optional: Site-wide settings
collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "data/settings.yml"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string", default: "Internationalist Communist Library" }
          - { label: "Welcome Message", name: "welcome", widget: "text", default: "Official shared library for the Internationalist Communist Discord server." }

  # ======================
  # MAIN READING LISTS
  # ======================
  - name: "reading_lists"
    label: "Reading Lists by Section"
    folder: "content/reading-lists"
    create: true
    extension: "md"
    slug: "{{language}}-{{slug}}"
    fields:
      - { label: "Section Title", name: "section_title", widget: "string", required: true }
      - { label: "Language", name: "language", widget: "select", options: ["en", "pt", "es"], default: "en" }
      - { label: "Section Order", name: "order", widget: "number", default: 10 }
      - { label: "Content (Markdown)", name: "body", widget: "markdown", required: true }

  # ======================
  # INDIVIDUAL TEXTS / WORKS
  # ======================
  - name: "texts"
    label: "Individual Texts & Resources"
    folder: "content/texts"
    create: true
    extension: "md"
    slug: "{{language}}-{{slug}}"
    identifier_field: "title"
    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Language", name: "language", widget: "select", options: ["en", "pt", "es", "it", "fr", "de"], default: "en" }
      - { label: "Section", name
