---
layout: default
---

<div class="nav">
  <a href="{{ site.baseurl }}/">🏠 Home</a> |
  <a href="{{ site.baseurl }}/{{ page.language }}/">← Back to Library</a>
</div>

<h1>{{ page.title }}</h1>
{% if page.author %}<p><strong>{{ page.author }}</strong></p>{% endif %}

<div style="margin: 40px 0; padding: 30px; border: 2px solid #e63939; border-radius: 8px;">
  <h3>PDF Viewer</h3>
  
  <a href="{{ site.baseurl }}/assets/uploads/{{ page.pdf }}" 
     target="_blank" 
     style="color: #e63939; font-size: 1.2em;">
    ⬇️ Download PDF
  </a>

  <iframe src="{{ site.baseurl }}/assets/uploads/{{ page.pdf }}" 
          width="100%" 
          height="800px" 
          style="margin-top: 20px; border: 1px solid #666;">
  </iframe>
</div>

<p style="text-align: center; margin-top: 40px;">
  <a href="{{ site.baseurl }}/{{ page.language }}/">← Back to Main Page</a>
</p>
