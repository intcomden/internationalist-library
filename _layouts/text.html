---
layout: default
---

<div class="nav">
  <a href="{{ site.baseurl }}/">🏠 Home</a> |
  <a href="{{ site.baseurl }}/{{ page.language }}/">← Back to Library</a>
</div>

<h1>{{ page.title }}</h1>
{% if page.author %}<p><strong>{{ page.author }}</strong></p>{% endif %}

<div style="margin: 40px 0; padding: 30px; border: 3px solid #e63939; border-radius: 8px; background: #2d2d2d; text-align: center;">
  <h2>PDF Viewer</h2>

  {% if page.pdf %}
    <p style="font-size: 1.2em; margin-bottom: 20px;">
      <a href="{{ site.baseurl }}/assets/uploads/{{ page.pdf }}" target="_blank" style="color: #e63939;">
        ⬇️ Download PDF
      </a>
    </p>

    <iframe 
      src="{{ site.baseurl }}/assets/uploads/{{ page.pdf }}" 
      width="100%" 
      height="800px" 
      style="border: 1px solid #666; background: white;">
    </iframe>
  {% else %}
    <p style="color: #ff6666; font-size: 1.2em;">No PDF attached to this entry.</p>
  {% endif %}
</div>

<p style="text-align: center; margin-top: 50px;">
  <a href="{{ site.baseurl }}/{{ page.language }}/">← Return to Main Library Page</a>
</p>
