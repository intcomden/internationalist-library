<!DOCTYPE html>
<html lang="{{ page.language | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ site.baseurl }}/favicon.png">
  <link rel="apple-touch-icon" href="{{ site.baseurl }}/favicon.png">

  <style>
    body { 
      font-family: Arial, Helvetica, sans-serif; 
      margin: 0; 
      padding: 40px; 
      background: #1e1e1e; 
      color: #ddd; 
      line-height: 1.7; 
    }
    .container { 
      max-width: 1000px; 
      margin: auto; 
      background: #2d2d2d; 
      padding: 40px; 
      border-radius: 8px; 
      box-shadow: 0 0 20px rgba(0,0,0,0.5); 
    }
    h1 { color: #e63939; text-align: center; }
    .nav { text-align: center; margin-bottom: 40px; font-size: 1.1em; }
    .nav a { margin: 0 12px; color: #e63939; }
  </style>
</head>
<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
