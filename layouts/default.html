<!DOCTYPE html>
<html lang="{{ page.language | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body { 
      font-family: Arial, Helvetica, sans-serif; 
      margin: 0; 
      padding: 40px; 
      background: #1e1e1e; 
      color: #ddd; 
      line-height: 1.7; 
    }
    .container { 
      max-width: 1000px; 
      margin: auto; 
      background: #2d2d2d; 
      padding: 40px; 
      border-radius: 8px; 
      box-shadow: 0 0 20px rgba(0,0,0,0.5); 
    }
    h1 { color: #e63939; text-align: center; margin-bottom: 10px; }
    h2 { 
      color: #e63939; 
      border-bottom: 2px solid #e63939; 
      padding-bottom: 10px; 
      margin-top: 50px; 
    }
    a { color: #e63939; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .nav { 
      text-align: center; 
      margin-bottom: 40px; 
      font-size: 1.1em; 
    }
    .nav a { margin: 0 12px; }
    ul { padding-left: 25px; }
    li { margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    {{ content }}
  </div>
</body>
</html>
