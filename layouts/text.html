---
layout: default
---

<div class="nav">
  <a href="{{ site.baseurl }}/">🏠 Home</a> |
  <a href="{{ site.baseurl }}/{{ page.language }}/">← Back to {{ page.language | upcase }} Library</a>
</div>

<h1>{{ page.title }}</h1>
<p><strong>{{ page.author }}</strong></p>

{% if page.description %}
  <p>{{ page.description }}</p>
{% endif %}

<div style="margin: 30px 0; padding: 25px; border: 2px solid #e63939; border-radius: 8px; background: #2d2d2d;">
  <h3>PDF Document</h3>
  
  <a href="{{ site.baseurl }}/assets/uploads/{{ page.pdf }}" 
     target="_blank" 
     style="font-size: 1.3em; color: #e63939; font-weight: bold;">
    ⬇️ Download PDF
  </a>

  <iframe src="{{ site.baseurl }}/assets/uploads/{{ page.pdf }}" 
          width="100%" 
          height="800px" 
          style="margin-top: 20px; border: 1px solid #666; background: white;">
  </iframe>
</div>

<p style="text-align: center; margin-top: 50px;">
  <a href="{{ site.baseurl }}/{{ page.language }}/">← Return to {{ page.language | upcase }} Main Library</a>
</p>
