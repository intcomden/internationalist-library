title: Internationalist Communist Library
description: Official shared library for the Internationalist Communist Discord server

baseurl: "/internationalist-library"
url: "https://intcomden.github.io"

collections:
  texts:
    output: true
    permalink: "/:language/:slug/"

# Disable sections to stop the error
sections:
  output: false

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - .nojekyll
