title: Internationalist Communist Library
description: Official shared library for the Internationalist Communist Discord server

# Basic settings
url: "https://yourusername.github.io"   # Change to your actual GitHub Pages URL
baseurl: ""                             # Leave empty for user/org sites

# Collections
collections:
  sections:
    output: true
    permalink: "/:language/:slug/"

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

  - scope:
      path: ""
      type: "sections"
    values:
      layout: "section"

# Build settings
markdown: kramdown
highlighter: rouge

# Exclude files from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore

baseurl: "/internationalist-library"   # ← Add this line
url: "https://intcomden.github.io"
